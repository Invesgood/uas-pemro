# ================= KONFIGURASI APLIKASI =================
spring.application.name=Reservasi Hotel
server.port=8081

# ================= DATABASE MySQL (JDBC) =================
# Pastikan MySQL berjalan dan database 'reservasi_hotel' sudah dibuat:
#   CREATE DATABASE reservasi_hotel;
# Ganti username & password sesuai MySQL kamu.
spring.datasource.url=jdbc:mysql://localhost:3306/reservasi_hotel?createDatabaseIfNotExist=true&serverTimezone=Asia/Jakarta
spring.datasource.username=root
spring.datasource.password=Root0211
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= SPRING DATA JPA / HIBERNATE =================
# update = tabel dibuat/diperbarui otomatis sesuai entity (tidak hapus data)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ================= THYMELEAF =================
spring.thymeleaf.cache=false
