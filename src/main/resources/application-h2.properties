# Profile cadangan memakai database H2 (in-memory), tanpa perlu install MySQL.
# Aktifkan dengan menjalankan:  --spring.profiles.active=h2
# (data hilang saat aplikasi dimatikan, hanya untuk demo cepat)

spring.datasource.url=jdbc:h2:mem:reservasi_hotel;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Akses console H2 di: http://localhost:8080/h2-console
spring.h2.console.enabled=true
