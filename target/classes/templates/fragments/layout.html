<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(judul)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${judul} + ' · Grand Anugerah Hotel'">Reservasi Hotel</title>
    <!-- Bootstrap 5 + Bootstrap Icons via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- ===== NAVBAR (dipakai semua halaman) ===== -->
<nav th:fragment="navbar(active)" class="navbar navbar-expand-lg site-nav">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-buildings"></i> Grand Anugerah Hotel
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#menuNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'home'} ? 'active'"
                       th:href="@{/}"><i class="bi bi-house-door me-1"></i>Beranda</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'form'} ? 'active'"
                       th:href="@{/reservasi/baru}"><i class="bi bi-calendar-plus me-1"></i>Pesan Kamar</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'daftar'} ? 'active'"
                       th:href="@{/reservasi}"><i class="bi bi-list-check me-1"></i>Daftar Reservasi</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ===== NOTIFIKASI (flash message) ===== -->
<div th:fragment="notifikasi" class="container mt-3">
    <div th:if="${sukses}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i><span th:text="${sukses}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- ===== FOOTER ===== -->
<footer th:fragment="footer" class="app-footer">
    <div>UAS · <span class="gold">Aplikasi Reservasi Hotel</span> · Spring Boot + Thymeleaf + JPA + MySQL</div>
</footer>

</body>
</html>
