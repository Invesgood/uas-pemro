<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Pesan Kamar')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar('form')}"></nav>

<header class="hero hero-sm">
    <div class="container">
        <div class="brand"><i class="bi bi-calendar-plus"></i> Pemesanan</div>
        <h1>Form Pesan Kamar</h1>
        <div class="gold-line"></div>
    </div>
</header>

<main class="content">
    <div class="container">

        <div th:replace="~{fragments/layout :: notifikasi}"></div>

        <!-- Info sisa kamar singkat -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-lg-4" th:each="info : ${infoKamar}">
                <div class="stat">
                    <span class="emoji"
                          th:text="${info.tipe == 'Standard' ? '🛏️' : (info.tipe == 'Deluxe' ? '✨' : '👑')}">🛏️</span>
                    <div>
                        <div class="num">
                            <span th:text="${info.sisa}">0</span><span class="fs-6 text-muted">/<span th:text="${info.kuota}">0</span></span>
                        </div>
                        <div class="lbl">
                            <span th:text="'Sisa ' + ${info.tipe}">Sisa</span>
                            <span th:if="${info.penuh}" class="badge bg-danger ms-1">PENUH</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card">
                    <div class="card-head"><i class="bi bi-calendar-plus ico"></i> Form Pemesanan</div>
                    <div class="card-body p-4">
                        <form th:action="@{/reservasi}" th:object="${reservasi}" method="post">

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-person me-1"></i>Nama Tamu</label>
                                <input type="text" class="form-control" th:field="*{namaTamu}"
                                       placeholder="cth: Andi Wijaya">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('namaTamu')}"
                                     th:errors="*{namaTamu}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-door-open me-1"></i>Tipe Kamar</label>
                                <select class="form-select" th:field="*{tipeKamar}">
                                    <option value="">-- Pilih Tipe Kamar --</option>
                                    <option value="Standard">🛏️ Standard</option>
                                    <option value="Deluxe">✨ Deluxe</option>
                                    <option value="Suite">👑 Suite</option>
                                </select>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('tipeKamar')}"
                                     th:errors="*{tipeKamar}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-box-arrow-in-right me-1"></i>Check-in</label>
                                <input type="date" class="form-control" th:field="*{tanggalCheckIn}"
                                       th:min="${T(java.time.LocalDate).now()}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('tanggalCheckIn')}"
                                     th:errors="*{tanggalCheckIn}"></div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label"><i class="bi bi-box-arrow-right me-1"></i>Check-out</label>
                                <input type="date" class="form-control" th:field="*{tanggalCheckOut}"
                                       th:min="${T(java.time.LocalDate).now()}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('tanggalCheckOut')}"
                                     th:errors="*{tanggalCheckOut}"></div>
                            </div>

                            <div class="d-flex gap-2">
                                <a th:href="@{/}" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-left me-1"></i> Kembali
                                </a>
                                <button type="submit" class="btn btn-book flex-grow-1">
                                    <i class="bi bi-bag-check me-1"></i> Pesan Sekarang
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
